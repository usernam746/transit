<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通費変換ツール</title>
<!-- version [index_v1] -->
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    margin: 0 0 8px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .subtitle {
    font-size: 15px;
    opacity: 0.85;
    margin: 0 0 40px;
    line-height: 1.6;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    h1 { font-size: 26px; }
  }
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    color: #333;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.28);
  }
  .card-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }
  .card-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .card-desc {
    font-size: 13px;
    color: #666;
    margin: 0 0 16px;
    line-height: 1.6;
    min-height: 3.2em;
  }
  .card-btn {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .card-suica .card-btn  { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
  .card-pasmo .card-btn  { background: linear-gradient(135deg, #ff6b6b, #ff9800); }
  .card-suica::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #1e3c72, #2a5298);
  }
  .card-pasmo::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #ff6b6b, #ff9800);
  }
  .footer {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 16px;
    line-height: 1.7;
  }
  .footer a { color: #fff; }
</style>
</head>
<body>
  <div class="container">
    <h1>🚃 交通費変換ツール</h1>
    <p class="subtitle">モバイルSuica / PASMO の利用履歴を、<br>会社申請フォーマットに自動変換します。</p>

    <div class="cards">
      <a href="suica.html" class="card card-suica">
        <span class="card-icon">🍉</span>
        <div class="card-title">SUICA版</div>
        <p class="card-desc">モバイルSuicaのSF残額履歴を変換。<br>JR東日本 会員メニューサイトから取得したPDF / コピペに対応。</p>
        <span class="card-btn">SUICA版を開く →</span>
      </a>

      <a href="pasmo.html" class="card card-pasmo">
        <span class="card-icon">🚃</span>
        <div class="card-title">PASMO版</div>
        <p class="card-desc">モバイルPASMOの利用履歴を変換。<br>PASMO公式サイトから取得したPDF / コピペに対応。</p>
        <span class="card-btn">PASMO版を開く →</span>
      </a>
    </div>

    <p class="footer">
      ※ データは全てブラウザ内（localStorage）で処理されます。サーバーへの送信は一切ありません。<br>
    </p>
  </div>
</body>
</html>
